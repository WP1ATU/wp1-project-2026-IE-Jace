<section>
  <h2>Today</h2>
  <app-search-form (searchSubmit)="onSearch($event)"></app-search-form>

  @if (loading) {
    <p>Loading today data...</p>
  }

  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }

  @if (todayData) {
    <h3>Today API Result</h3>
    <pre>{{ todayData | json }}</pre>
  }
</section>
