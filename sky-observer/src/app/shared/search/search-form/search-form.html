<form class="search-form" [formGroup]="searchForm" (ngSubmit)="onSubmit()">
  <label>
    Date
    <input type="date" formControlName="date" />
  </label>

  <label>
    Year
    <input type="number" formControlName="year" />
  </label>

  <label>
    Coordinates (lat,lon)
    <input type="text" formControlName="coords" placeholder="51.50,-0.12" />
  </label>

  <label>
    TZ
    <input type="number" formControlName="tz" />
  </label>

  <label class="checkbox-row">
    <input type="checkbox" formControlName="dst" />
    Daylight saving time
  </label>

  <button type="submit" [disabled]="searchForm.invalid">Search</button>

  @if (searchForm.invalid && (searchForm.touched || searchForm.dirty)) {
    <p class="error">Please fix invalid fields before searching.</p>
  }
</form>
