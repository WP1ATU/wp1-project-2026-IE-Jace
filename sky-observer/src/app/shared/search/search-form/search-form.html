<form class="search-form row g-3 align-items-end" [formGroup]="searchForm" (ngSubmit)="onSubmit()">
  <label class="col-md-6 form-label">
    <span>Date</span>
    <input class="form-control" type="date" formControlName="date" />
  </label>

  <label class="col-md-6 form-label">
    <span>Year</span>
    <input class="form-control" type="number" formControlName="year" />
  </label>

  <label class="col-md-6 form-label">
    <span>Coordinates (lat,lon)</span>
    <input class="form-control" type="text" formControlName="coords" placeholder="51.50,-0.12" />
  </label>

  <label class="col-md-6 form-label">
    <span>TZ</span>
    <input class="form-control" type="number" formControlName="tz" />
  </label>

  <label class="col-12 checkbox-row form-check">
    <input class="form-check-input" type="checkbox" formControlName="dst" />
    <span class="form-check-label">Daylight saving time</span>
  </label>

  <div class="col-12">
    <button class="btn btn-primary" type="submit" [disabled]="searchForm.invalid">Search</button>
  </div>

  @if (searchForm.invalid && (searchForm.touched || searchForm.dirty)) {
    <p class="error col-12 mb-0">Please fix invalid fields before searching.</p>
  }
</form>
