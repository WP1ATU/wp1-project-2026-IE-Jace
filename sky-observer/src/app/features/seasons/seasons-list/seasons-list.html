<section>
  <h3>Season Events</h3>

  @if (items.length === 0) {
    <p>No season data yet. Run a search.</p>
  }

  @for (item of items; track $index) {
    <button type="button" class="season-item btn btn-outline-secondary w-100 text-start mb-2" (click)="onSelect(item)">
      {{ item.phenom }} - {{ item.year }}/{{ item.month }}/{{ item.day }} {{ item.time }}
    </button>
  }
</section>
